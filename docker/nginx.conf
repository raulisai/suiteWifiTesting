# nginx config for the frontend-only container.
# The backend runs NATIVELY on the Kali host at port 8000 — NOT in Docker.
# host.docker.internal resolves to the host machine from inside the container.

server {
    listen 80;
    server_name _;

    # Serve the built React SPA
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy REST API calls to native backend on host
    location /api/ {
        proxy_pass         http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # WebSocket proxy — Upgrade headers are mandatory for WS handshake
    location ~ ^/api/.*/stream$ {
        proxy_pass         http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
    }
}
